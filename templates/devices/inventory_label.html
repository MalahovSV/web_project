<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Этикетка: {{ device.inventory_number }}</title>
    <style>
        @page {
            size: 70mm 70mm;
            margin: 0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Arial", sans-serif;
            padding: 3mm;
            background: white;
        }
        
        .label-container {
            border: 1px solid #000;
            width: 64mm;
            height: 64mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3mm;
            padding: 4mm;
        }
        
        .header {
            font-size: 7pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #000;
            padding-bottom: 2mm;
            width: 100%;
            text-align: center;
        }
        
        .qr-section {
            width: 36mm;
            height: 36mm;
        }
        
        .qr-section img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .inv-number {
            font-size: 9pt;
            font-weight: bold;
            text-align: center;
            border: 1px solid #000;
            padding: 2mm 4mm;
            font-family: "Courier New", monospace;
            background: #f5f5f5;
            width: fit-content;
        }
        
        .device-name {
            font-size: 7pt;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
            max-width: 90%;
        }
        
        .device-type {
            font-size: 6pt;
            color: #555;
            text-align: center;
        }
        
        .footer {
            font-size: 5pt;
            color: #666;
            border-top: 1px solid #ccc;
            padding-top: 2mm;
            width: 100%;
            text-align: center;
        }
        
        @media print {
            body {
                padding: 0;
            }
            .label-container {
                border: 1px solid #000;
            }
        }
    </style>
</head>
<body>
    <div class="label-container">
        <div class="header">ИНВЕНТАРНЫЙ НОМЕР</div>
        
        <div class="qr-section">
            <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
        </div>
        
        <div class="inv-number">{{ device.inventory_number }}</div>
        
        <div class="device-name">{{ device.name }}</div>
        
        <div class="device-type">{{ device.device_type.name }}</div>
        
        <div class="footer">Отсканируйте для информации</div>
    </div>
    
    <script>
        // window.print(); // Раскомментируй для автопечати
    </script>
</body>
</html>
